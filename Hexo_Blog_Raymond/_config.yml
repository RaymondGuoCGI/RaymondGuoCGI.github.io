# Hexo Configuration
title: Raymond Studio
subtitle: ''
description: '2026 AI & 3D Modeling Portfolio'
keywords:
author: Raymond Guo
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://raymondstudio.cn/
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Extensions
theme: butterfly
sitemap:
  path: sitemap.xml

# Deployment
deploy:
  type: git
  repo: git@github.com:RaymondGuoCGI/RaymondGuoCGI.github.io.git
  branch: master
